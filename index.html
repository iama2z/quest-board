<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Quest Board</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root {
  --bg:#0a0a12; --panel:#11111e; --card:#181828; --card2:#1e1e32;
  --border:#2a2a45; --accent:#00e5ff; --accent2:#7c4dff;
  --high:#ff4757; --med:#ffa502; --low:#2ed573;
  --text:#e8e8f0; --muted:#6060a0;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --mono: 'Courier New', Courier, monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);
  display:flex;height:100dvh;overflow:hidden;}

/* ── SIDEBAR ── */
#sidebar{width:360px;min-width:360px;background:var(--panel);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  transition:transform .3s ease;z-index:100;}
.sidebar-top{padding:16px;border-bottom:1px solid var(--border);}
.sidebar-top h2{font-size:.95em;font-weight:700;color:var(--accent);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
.add-form{display:flex;flex-direction:column;gap:8px;}
.add-form input,.add-form select{background:var(--bg);border:1px solid var(--border);
  color:var(--text);padding:7px 10px;border-radius:6px;font-size:.88em;
  outline:none;width:100%;font-family:var(--font);}
.add-form input:focus,.add-form select:focus{border-color:var(--accent);}
.add-form input::placeholder{color:var(--muted);}
.add-form select option{background:#1a1a30;}
.form-row{display:flex;gap:8px;}.form-row>*{flex:1;}
.btn-add{background:var(--accent2);border:none;color:#fff;padding:9px;
  border-radius:6px;cursor:pointer;font-weight:700;font-size:.88em;
  letter-spacing:1px;text-transform:uppercase;width:100%;}
.btn-add:hover{opacity:.85;}
#lib {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 10px 10px 80px 10px;
  bar-width: thin;
  bar-color: var(--border) transparent;
  -webkit-overflow-ing: touch;
}
.cat{margin-bottom:6px;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.cat-hd{padding:10px 14px;background:var(--card);cursor:pointer;user-select:none;
  display:flex;justify-content:space-between;align-items:center;
  font-weight:600;font-size:.88em;transition:background .15s;}
.cat-hd:hover{background:var(--card2);}
.cat-arrow{transition:transform .2s;font-size:.75em;color:var(--muted);}
.cat.open .cat-arrow{transform:rotate(90deg);}
.cat-body{display:none;padding:6px;background:rgba(0,0,0,.2);}
.cat.open .cat-body{display:block;}
.lib-card{display:flex;justify-content:space-between;align-items:center;
  background:var(--card);border-radius:6px;padding:8px 10px;margin-bottom:4px;
  border-left:3px solid var(--border);}
.lib-card:hover{background:var(--card2);}
.lib-card.H{border-left-color:var(--high);}
.lib-card.M{border-left-color:var(--med);}
.lib-card.L{border-left-color:var(--low);}
.lib-info{flex-grow:1;margin-right:8px;}
.lib-title{font-size:.85em;font-weight:600;line-height:1.3;}
.lib-meta{color:var(--muted);font-size:.72em;margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;}
.badge{font-size:.7em;padding:2px 6px;border-radius:10px;font-weight:700;font-family:var(--mono);}
.badge.High{background:rgba(255,71,87,.2);color:var(--high);}
.badge.Med{background:rgba(255,165,2,.2);color:var(--med);}
.badge.Low{background:rgba(46,213,115,.2);color:var(--low);}
.owner{background:rgba(124,77,255,.15);color:#a78bfa;padding:1px 6px;
  border-radius:8px;font-size:.7em;font-weight:600;}
.btn-push{background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.3);
  color:var(--accent);border-radius:5px;padding:4px 8px;font-size:.78em;
  cursor:pointer;white-space:nowrap;font-weight:600;}
.btn-push:hover{background:rgba(0,229,255,.2);}
#close-sb{display:none;position:absolute;top:10px;right:10px;
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  color:var(--muted);width:28px;height:28px;border-radius:50%;cursor:pointer;
  font-size:.85em;align-items:center;justify-content:center;}
#close-sb:hover{color:var(--text);}

/* ── MAIN ── */
#main{flex-grow:1;display:flex;flex-direction:column;overflow:hidden;}
#hdr{padding:12px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;
  background:linear-gradient(90deg,#0e0e1e,#131328);flex-shrink:0;}
.hdr-left{display:flex;align-items:center;gap:8px;}
#hdr h1{font-size:1.4em;font-weight:800;color:var(--accent);
  letter-spacing:2px;text-transform:uppercase;white-space:nowrap;}
.stats{display:flex;gap:12px;font-family:var(--mono);font-size:.76em;color:var(--muted);}
.stats b{color:var(--accent);}
.hdr-btns{display:flex;gap:6px;}
.hbtn{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);
  padding:6px 12px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.82em;
  transition:all .15s;white-space:nowrap;}
.hbtn:hover{background:rgba(0,229,255,.08);border-color:var(--accent);color:var(--accent);}
#mob-btn{display:none;}
#filter-bar{padding:8px 16px;border-bottom:1px solid var(--border);
  display:flex;gap:5px;flex-wrap:wrap;background:var(--panel);flex-shrink:0;}
.fb{background:var(--card);border:1px solid var(--border);color:var(--muted);
  padding:4px 11px;border-radius:20px;cursor:pointer;font-weight:600;font-size:.76em;
  transition:all .15s;}
.fb:hover,.fb.on{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.06);}
.fb.fh.on{border-color:var(--high);color:var(--high);background:rgba(255,71,87,.06);}
.fb.fm.on{border-color:var(--med);color:var(--med);background:rgba(255,165,2,.06);}
.fb.fl.on{border-color:var(--low);color:var(--low);background:rgba(46,213,115,.06);}
#scroll {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 14px 16px 80px 16px;
  bar-width: thin;
  bar-color: var(--border) transparent;
  -webkit-overflow-ing: touch;
}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:12px;}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);font-size:.9em;}
.empty-icon{font-size:2.5em;margin-bottom:8px;opacity:.35;}

/* ── BOARD CARDS ── */
.bc{background:var(--card);border-radius:10px;border:1px solid var(--border);
  border-top:3px solid var(--border);padding:13px;display:flex;flex-direction:column;
  gap:8px;animation:ci .3s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes ci{from{opacity:0;transform:translateY(8px) scale(.96)}to{opacity:1;transform:none}}
.bc.H{border-top-color:var(--high);}.bc.M{border-top-color:var(--med);}.bc.L{border-top-color:var(--low);}
.bc:hover{box-shadow:0 4px 18px rgba(0,0,0,.4);}
.bc.done{opacity:.4;filter:grayscale(80%);transition:all .5s;}
.ct{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;}
.ctitle{font-weight:700;font-size:.92em;line-height:1.4;flex-grow:1;}
.room-badge{color:var(--accent);font-size:0.65em;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.crmv{background:transparent;border:none;color:var(--muted);cursor:pointer;
  padding:2px 5px;border-radius:4px;font-size:.85em;transition:color .15s;}
.crmv:hover{color:var(--high);}
.cmeta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;
  font-size:.76em;color:var(--muted);font-family:var(--mono);}

/* Per-card timer bar */
.card-timer-row{display:none;align-items:center;gap:8px;
  background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.2);
  border-radius:6px;padding:6px 10px;}
.card-timer-row.on{display:flex;}
.card-timer-display{font-family:var(--mono);font-size:1.3em;color:var(--accent);min-width:52px;font-weight:bold;}
.card-timer-display.red{color:var(--high);}
.card-timer-label{font-size:.72em;color:var(--muted);flex-grow:1;}
.card-timer-btn{background:transparent;border:1px solid var(--border);color:var(--muted);
  width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:.7em;
  display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.card-timer-btn:hover{border-color:var(--accent);color:var(--accent);}
.card-timer-btn.xb:hover{border-color:var(--high);color:var(--high);}

/* ── INLINE EDIT PANEL ── */
.edit-panel{display:none;flex-direction:column;gap:7px;
  background:rgba(0,0,0,.25);border:1px solid var(--border);
  border-radius:8px;padding:10px;}
.edit-panel.on{display:flex;}
.edit-panel input,.edit-panel select{background:var(--bg);border:1px solid var(--border);
  color:var(--text);padding:6px 9px;border-radius:5px;font-size:.82em;
  font-family:var(--font);outline:none;width:100%;}
.edit-panel input:focus,.edit-panel select:focus{border-color:var(--accent);}
.edit-panel select option{background:#1a1a30;}
.edit-row{display:flex;gap:7px;}.edit-row>*{flex:1;}
.edit-save{background:rgba(46,213,115,.15);border:1px solid rgba(46,213,115,.4);
  color:var(--low);padding:6px;border-radius:5px;cursor:pointer;
  font-weight:700;font-size:.8em;width:100%;transition:background .15s;}
.edit-save:hover{background:rgba(46,213,115,.28);}
.cbtn.edit-active{background:rgba(255,165,2,.12);border-color:var(--med);color:var(--med);}

.card-photo{width:100%;border-radius:6px;object-fit:cover;max-height:120px;
  border:1px solid var(--border);display:none;margin-top:2px;}
.card-photo.show{display:block;}
.cbot{display:flex;justify-content:space-between;align-items:center;gap:6px;
  border-top:1px solid var(--border);padding-top:8px;}
.cbtns{display:flex;gap:5px;}
.cbtn{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);
  padding:4px 8px;border-radius:5px;cursor:pointer;font-size:.76em;font-weight:600;
  transition:all .15s;white-space:nowrap;}
.cbtn:hover{background:rgba(0,229,255,.08);border-color:var(--accent);color:var(--accent);}
.cbtn.timer-active{background:rgba(0,229,255,.12);border-color:var(--accent);color:var(--accent);}
.chk{appearance:none;-webkit-appearance:none;width:26px;height:26px;
  border:2px solid var(--muted);border-radius:6px;cursor:pointer;
  position:relative;flex-shrink:0;transition:all .2s;}
.chk:hover{border-color:var(--accent);}
.chk:checked{background:var(--low);border-color:var(--low);}
.chk:checked::after{content:'V';position:absolute;color:var(--bg);
  font-size:15px;font-weight:900;top:50%;left:50%;transform:translate(-50%,-50%);}

/* ── PHOTO MODAL ── */
#photo-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:2000;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
#photo-modal.on{display:flex;}
.pm-box{background:var(--panel);border:1px solid var(--border);border-radius:14px;
  padding:24px;max-width:320px;width:90%;text-align:center;}
.pm-box h3{color:var(--accent);font-size:1em;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;}
.pm-preview{width:100%;border-radius:8px;max-height:200px;object-fit:cover;
  border:1px solid var(--border);display:none;margin-bottom:12px;}
.pm-preview.show{display:block;}
.pm-btns{display:flex;flex-direction:column;gap:8px;}
.pm-btn{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);
  padding:10px;border-radius:8px;cursor:pointer;font-weight:600;font-size:.88em;
  transition:all .15s;width:100%;}
.pm-btn:hover{background:rgba(0,229,255,.08);border-color:var(--accent);color:var(--accent);}
.pm-btn.save{background:rgba(46,213,115,.12);border-color:rgba(46,213,115,.4);color:var(--low);}
.pm-btn.save:hover{background:rgba(46,213,115,.22);}
.pm-btn.cancel{color:var(--muted);}
#pm-file{display:none;}

/* ── FULLSCREEN MODE ── */
body.fs-mode #sidebar{display:none!important;}
body.fs-mode #filter-bar{display:none;}
body.fs-mode #mob-btn{display:none!important;}
body.fs-mode #hdr h1{letter-spacing:4px;}
body.fs-mode .grid{grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
body.fs-mode #{padding:20px 32px;}

/* ── OVERLAY & CONFIRM ── */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:90;}
#overlay.on{display:block;}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:1000;align-items:center;justify-content:center;}
#modal.on{display:flex;}
.mbox{background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:28px;text-align:center;max-width:290px;}
.mbox h3{font-size:1.1em;color:var(--accent);margin-bottom:8px;letter-spacing:2px;}
.mbox p{color:var(--muted);font-size:.86em;margin-bottom:18px;}
.mbtns{display:flex;gap:8px;justify-content:center;}
.mbtns button{padding:7px 20px;border-radius:6px;font-weight:700;
  font-size:.86em;cursor:pointer;border:1px solid var(--border);transition:all .15s;}
.myes{background:rgba(255,71,87,.15);color:var(--high);border-color:rgba(255,71,87,.4);}
.myes:hover{background:rgba(255,71,87,.3);}
.mno{background:rgba(255,255,255,.04);color:var(--text);}
.mno:hover{background:rgba(255,255,255,.08);}

@keyframes flash{0%{box-shadow:0 0 0 0 rgba(46,213,115,.8)}70%{box-shadow:0 0 0 18px rgba(46,213,115,0)}100%{box-shadow:0 0 0 0 rgba(46,213,115,0)}}
.fl{animation:flash .6s ease-out;}

@media(max-width:768px){
  #sidebar{position:fixed;top:0;left:0;bottom:0;height:100%;
    transform:translateX(-110%);width:88%;max-width:360px;z-index:200;
    box-shadow:4px 0 20px rgba(0,0,0,.6);}
  #sidebar.on{transform:translateX(0);}
  #mob-btn{display:inline-flex;}
  #close-sb{display:flex;}
  #hdr h1{font-size:1.15em;}
  .stats{display:none;}
  .grid{grid-template-columns:1fr;}
}
::-webkit-bar{width:4px;}
::-webkit-bar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<div id="overlay" onclick="toggleSB()"></div>

<div id="modal">
  <div class="mbox">
    <h3>CLEAR BOARD?</h3>
    <p>Remove all active quests from the board?</p>
    <div class="mbtns">
      <button class="myes" onclick="doClear()">Yes, Clear</button>
      <button class="mno" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<div id="photo-modal">
  <div class="pm-box">
    <h3>Save Photo Proof?</h3>
    <img class="pm-preview" id="pm-preview" alt="Preview">
    <div class="pm-btns">
      <button class="pm-btn save" id="pm-save" onclick="pmSave()">Save to Card</button>
      <button class="pm-btn cancel" onclick="pmClose()">Cancel</button>
    </div>
  </div>
</div>
<input type="file" id="pm-file" accept="image/*" style="position:fixed;left:-9999px;opacity:0;width:1px;height:1px;" onchange="pmPreview(this)">

<div id="sidebar">
  <button id="close-sb" onclick="toggleSB()">X</button>
  <div class="sidebar-top">
    <h2>+ Add Custom Task</h2>
    <div class="add-form">
      <input type="text" id="nt-title" placeholder="Task name">
      <div class="form-row">
        <input type="number" id="nt-time" placeholder="Minutes" min="1" max="120">
        <input type="text" id="nt-owner" placeholder="Owner">
      </div>
      <div class="form-row">
        <select id="nt-cat">
          <option>Logistics &amp; Self-Care</option>
          <option>Kitchen &amp; Dining</option>
          <option>Living Room</option>
          <option>Family Room</option>
          <option>Bedrooms &amp; Hallways</option>
          <option>Bathrooms</option>
          <option>Outdoor &amp; Garage</option>
        </select>
        <select id="nt-pri">
          <option value="High">High</option>
          <option value="Med">Med</option>
          <option value="Low">Low</option>
        </select>
      </div>
      <button class="btn-add" onclick="addCustom()">+ Add to Library</button>
    </div>
  </div>
  <div id="lib"></div>
</div>

<div id="main">
  <div id="hdr">
    <div class="hdr-left">
      <button class="hbtn" id="mob-btn" onclick="toggleSB()">Menu</button>
      <h1>Master Quest Board</h1>
    </div>
    <div class="stats">
      Active: <b id="sa">0</b> &nbsp;
      Done: <b id="sd">0</b> &nbsp;
      XP: <b id="sx">0</b> &nbsp;
      <span id="sync-status" style="font-size:.75em;transition:color .3s;"></span>
    </div>
    <div class="hdr-btns">
  <button class="hbtn" onclick="document.getElementById('modal').classList.add('on')">Clear Board</button>
  <button class="hbtn" id="undo-btn" style="display:none; color:var(--med); border-color:var(--med);" onclick="undoClear()">Undo</button>
  <button class="hbtn" id="fs-btn" onclick="toggleFS()">Fullscreen</button>
</div>

  <div id="filter-bar">
    <button class="fb on" onclick="setF('all',this)">All</button>
    <button class="fb fh" onclick="setF('High',this)">High</button>
    <button class="fb fm" onclick="setF('Med',this)">Med</button>
    <button class="fb fl" onclick="setF('Low',this)">Low</button>
    
    <button class="fb" onclick="setF('Andrew',this)">Andrew</button>
    <button class="fb" onclick="setF('Toby',this)">Toby</button>
    <button class="fb" onclick="setF('Joella',this)">Joella</button>
    <button class="fb" onclick="setF('Avett',this)">Avett</button>
    <button class="fb" onclick="setF('Anyone',this)">Anyone</button>

    <div style="border-left: 1px solid var(--border); margin: 0 5px; height: 20px;"></div>
    <button class="fb" onclick="setF('Kitchen & Dining',this)">Kitchen</button>
    <button class="fb" onclick="setF('Living Room',this)">Living Rm</button>
    <button class="fb" onclick="setF('Family Room',this)">Family Rm</button>
    <button class="fb" onclick="setF('Bedrooms & Hallways',this)">Beds/Halls</button>
    <button class="fb" onclick="setF('Bathrooms',this)">Baths</button>
    <button class="fb" onclick="setF('Outdoor & Garage',this)">Garage</button>
  </div>

  <div id="">
    <div class="grid" id="board"></div>
  </div>
</div>

      if(t.id===id) { task=t; catName=cat; }

  var bid='b'+(uid++);

  active.push({id:task.id, c:catName, t:task.t, m:task.m, o:task.o, p:task.p, bid:bid, photo:null});

var OWNERS = ["Andrew","Toby","Joella","Katelynn","Avett","Aliena","Anyone","Toby/Joella"];

function buildTimeOpts(current){
  var html='';
  for(var i=5;i<=90;i+=5){ html+='<option value="'+i+'"'+(i===current?' selected':'')+'>'+i+' min</option>'; }
  if(current%5!==0){ html='<option value="'+current+'" selected>'+current+' min</option>'+html; }
  return html;
}
function buildOwnerOpts(current){
  var owners = OWNERS.slice();
  if(owners.indexOf(current)<0) owners.unshift(current);
  return owners.map(function(o){
    return '<option value="'+o+'"'+(o===current?' selected':'')+'>'+o+'</option>';
  }).join('');
}

    board.innerHTML='<div class="empty"><div class="empty-icon">&#127919;</div><p>Quest Board is empty &mdash; add tasks from the library!</p></div>';
    return;

  var vis=active.filter(function(t){
    if(filt==='all') return true;
    if(['High','Med','Low'].indexOf(filt)>=0) return t.p===filt;
    if(['Andrew','Toby','Joella','Avett','Anyone'].indexOf(filt)>=0) return t.o.toLowerCase().indexOf(filt.toLowerCase())>=0;
    // Room Filter Match (checks if the category string matches the filter)
    return (t.c || '').toLowerCase().indexOf(filt.toLowerCase())>=0;
  });
  
  if(!vis.length){
    board.innerHTML='<div class="empty"><div class="empty-icon">&#128269;</div><p>No tasks match this filter.</p></div>';
    return;
  }
  
  vis.forEach(function(t){

      +'<input type="text" id="ei-name-'+t.bid+'" value="'+t.t.replace(/"/g,'&quot;')+'">'

      +'<select id="ei-time-'+t.bid+'">'+buildTimeOpts(t.m)+'</select>'
      +'<select id="ei-owner-'+t.bid+'">'+buildOwnerOpts(t.o)+'</select>'
      +'</div>'
      +'<select id="ei-pri-'+t.bid+'">'
      +'<option value="High"'+(t.p==='High'?' selected':'')+'>High Priority</option>'
      +'<option value="Med"'+(t.p==='Med'?' selected':'')+'>Med Priority</option>'

      +'</select>'

      +'</div>'

      +'<div class="card-timer-display" id="td-'+t.bid+'">'+fmt(hasTimer?hasTimer.sec:t.m*60)+'</div>'
      +'<div class="card-timer-label" id="tl-'+t.bid+'">'+(hasTimer?(hasTimer.paused?'Paused':'Running...'):'')+'</div>'

  renderBoard(); updateStats();

function toggleDone(bid,mins,cb){
  if(cb.checked){
    done.add(bid); xp+=mins; boom(); ding();
    var c=document.getElementById('card-'+bid);
    if(c){c.classList.add('done','fl');c.addEventListener('animationend',function(){c.classList.remove('fl');},{once:true});}
  } else {
    done.delete(bid); xp=Math.max(0,xp-mins);
    var c=document.getElementById('card-'+bid); if(c)c.classList.remove('done');
  }
  updateStats();
}

  var nameEl =document.getElementById('ei-name-'+bid);

  var newName =nameEl.value||task.t;

  var newOwner=ownerEl.value||task.o;
  var newPri  =priEl.value;

  task.t=newName; task.m=newTime; task.o=newOwner; task.p=newPri;

}

// ── PER-CARD TIMERS ───────────────────────────────────────
function timerStart(bid,mins){
  if(timers[bid]){timerPauseToggle(bid);return;}
  var task=active.filter(function(t){return t.bid===bid;})[0];
  if(!task)return;
  timers[bid]={sec:mins*60,paused:false,interval:null};
  var row=document.getElementById('tr-'+bid);
  var btn=document.getElementById('tb-'+bid);
  var pb=document.getElementById('tp-'+bid);
  if(row)row.classList.add('on');
  if(btn)btn.classList.add('timer-active');
  if(pb)pb.innerHTML='&#9646;&#9646;';

  timers[bid].interval=setInterval(function(){
    if(!timers[bid]||timers[bid].paused)return;
    timers[bid].sec--;
    var td=document.getElementById('td-'+bid);
    var tl=document.getElementById('tl-'+bid);
    if(td){
      td.textContent=fmt(timers[bid].sec);
      if(timers[bid].sec<=30&&timers[bid].sec>0)td.classList.add('red');
      else td.classList.remove('red');
    }
    if(tl)tl.textContent='Running...';
    if(timers[bid].sec<=0){
      clearInterval(timers[bid].interval);
      if(td)td.textContent='DONE!';
      if(td)td.classList.remove('red');
      if(tl)tl.textContent='Complete!';
      alarm();
      setTimeout(function(){timerStop(bid);},3000);
    }
  },1000);
}

function timerPauseToggle(bid){
  if(!timers[bid])return;
  timers[bid].paused=!timers[bid].paused;
  var pb=document.getElementById('tp-'+bid);
  var tl=document.getElementById('tl-'+bid);
  if(pb)pb.innerHTML=timers[bid].paused?'&#9654;':'&#9646;&#9646;';
  if(tl)tl.textContent=timers[bid].paused?'Paused':'Running...';
}

function timerStop(bid){
  if(timers[bid]){ clearInterval(timers[bid].interval); delete timers[bid]; }
  var row=document.getElementById('tr-'+bid);
  var btn=document.getElementById('tb-'+bid);
  var td=document.getElementById('td-'+bid);
  if(row)row.classList.remove('on');
  if(btn)btn.classList.remove('timer-active');
  var task=active.filter(function(t){return t.bid===bid;})[0];
  if(task&&td)td.textContent=fmt(task.m*60);
}

// ── AUDIO ─────────────────────────────────────────────────
function getAC(){if(!window._ac)window._ac=new(window.AudioContext||window.webkitAudioContext)();return window._ac;}
function ding(){
  try{var c=getAC();[523,659,784,1047].forEach(function(f,i){
    var o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.frequency.value=f;o.type='sine';
    var t=c.currentTime+i*.1;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.3,t+.02);
    g.gain.exponentialRampToValueAtTime(.001,t+.4);
    o.start(t);o.stop(t+.45);
  });}catch(e){}
}
function alarm(){
  try{var c=getAC();[440,880,440,880].forEach(function(f,i){
    var o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.frequency.value=f;o.type='square';
    var t=c.currentTime+i*.15;
    g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);
    o.start(t);o.stop(t+.15);
  });}catch(e){}
}

function fbSave(){
  isSaving = true; 
  var payload = {
    active: active.map(function(t){
      return {id:t.id, c:(t.c||'Misc'), t:t.t, m:t.m, o:t.o, p:t.p, bid:t.bid};
    }),
    done:   Array.from(done),
    xp:     xp
  };
  
  boardRef.set(payload).then(function(){
    setSyncStatus('Synced', 'var(--low)');
    setTimeout(function(){setSyncStatus('');},2000);
    setTimeout(function(){ isSaving = false; }, 500); 
  }).catch(function(e){
    isSaving = false;
    setSyncStatus('Sync error', 'var(--high)');
    console.error('Firebase save error:',e);
  });
}

function applyIncomingData(data) {
  active = data.active || [];
  done   = new Set(data.done || []);
  xp     = data.xp || 0;

  active.forEach(function(t){
    var idNum = parseInt(t.bid.replace('b',''));
    if(!isNaN(idNum) && idNum >= uid) uid = idNum + 1;
  });

  renderBoard();
  updateStats();
}

function fbListen(){
  boardRef.once('value').then(function(snap){
    var data = snap.val();
    if(data) applyIncomingData(data);

    boardRef.on('value', function(liveSnap){
      if(isSaving) return; 
      var liveData = liveSnap.val();
      if(liveData) {
        applyIncomingData(liveData);
        setSyncStatus('Updated from another device', 'var(--accent)');
        setTimeout(function(){setSyncStatus('');},3000);
      }
    });
  });
}

// Patch all state-changing functions
var _origToggleDone = toggleDone;
toggleDone = function(bid,mins,cb){ _origToggleDone(bid,mins,cb); fbSave(); };

var _origRmCard = rmCard;
rmCard = function(bid){ _origRmCard(bid); fbSave(); };

var _origPush = push;
push = function(id){ _origPush(id); fbSave(); };

var _origSaveEdit = saveEdit;
saveEdit = function(bid){ _origSaveEdit(bid); fbSave(); };

// ── UNDO CLEAR LOGIC ──────────────────────────────────────
var backupState = null;

var _origDoClear = doClear;
doClear = function(){
  // 1. Take a snapshot of the board BEFORE it wipes
  backupState = {
    active: JSON.parse(JSON.stringify(active)), 
    done: Array.from(done),
    xp: xp
  };
  
  // 2. Make the Undo button visible
  var undoBtn = document.getElementById('undo-btn');
  if(undoBtn) undoBtn.style.display = 'inline-block';

  // 3. Proceed with the normal clear and wipe Firebase
  _origDoClear();
  isSaving = true;
  boardRef.set(null).then(function(){
    setTimeout(function(){ isSaving = false; }, 500);
  });
};

function undoClear() {
  if(!backupState) return;
  
  // 1. Restore the snapshot data
  active = backupState.active;
  done = new Set(backupState.done);
  xp = backupState.xp;
  
  // 2. Hide the Undo button and clear the backup memory
  document.getElementById('undo-btn').style.display = 'none';
  backupState = null;
  
  // 3. Re-render the screen and push the restored board back to Firebase!
  renderBoard();
  updateStats();
  fbSave();
}

// ── INIT ──────────────────────────────────────────────────
renderLib();
renderBoard();
updateStats();
fbListen(); 
</script>
